<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/cmj2-dual-slots-pixi/assets/ui/pwa-icon-192.png" />
    <title>雀靈戰記 · Dual Slots (Pixi)</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0a0e1a; color: #e0e8ff; font-family: Arial, sans-serif; height: 100%; }
      /* Portrait canvas: scale to fit viewport height, centre horizontally */
      #app {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 8px 0;
        box-sizing: border-box;
      }
      canvas {
        display: block;
        max-height: calc(100vh - 16px);
        width: auto !important;
        height: auto !important;
        border: 1px solid #1a2a40;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
